<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asset Management Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div id="app" class="container-fluid">
    <div id="loginPane" class="row vh-100 align-items-center justify-content-center">
      <div class="col-md-4 card p-4 shadow">
        <h3 class="mb-3">Asset Manager Login</h3>
        <input id="username" class="form-control mb-2" placeholder="username" value="admin" />
        <input id="password" type="password" class="form-control mb-3" placeholder="password" value="admin123" />
        <button id="loginBtn" class="btn btn-primary">Login</button>
        <div id="loginError" class="text-danger mt-2"></div>
      </div>
    </div>

    <div id="mainPane" class="row d-none">
      <aside class="col-md-2 sidebar p-3">
        <h5 id="whoami"></h5>
        <ul id="navList" class="nav flex-column"></ul>
      </aside>
      <main class="col-md-10 p-4">
        <div class="d-flex justify-content-between mb-3">
          <h3 id="screenTitle">Dashboard</h3>
          <button id="logoutBtn" class="btn btn-outline-secondary btn-sm">Logout</button>
        </div>
        <div id="content"></div>
      </main>
    </div>
  </div>

  <script src="https://s3.tradingview.com/tv.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
